# sn_llama_counsel configuration
# Override any value with environment variables:
#   LLAMA_API_BASE, LLAMA_API_KEY, LLAMA_DEFAULT_MODEL

# llama-server API — via mitmweb reverse proxy at :8080 → :11434
# This lets you inspect all model calls in the mitmweb UI at http://localhost:8081
api_base: http://localhost:8080

# API key — use "none" for local llama-server without auth
# Use "sk-llama" if you're routing through LiteLLM proxy (:4000)
api_key: none

# Model used for auto-select (chairperson LLM for council selection)
# Should be fast and instruction-following
default_model: llama-3.1-8b-instant
